order = 10
command = "archival schemas"
content = """
Generates [JSON Schema](https://json-schema.org/) files from your site’s object definitions. These schemas describe the exact shape of each object type, which is useful for editor autocomplete and inline validation while you hand-edit object toml files, for validating data in CI, and for sending to LLMs that support structured outputs.

By default, a schema file is written for each object type (plus a root schema) into your site’s `schemas_dir` (`schemas` unless overridden in `manifest.toml`). To reference a generated schema from an object file, add a schema directive at the top of the file, for example:

```toml
#:schema ./schemas/post.schema.json
```
"""

[[options]]
flags = "-o, --object <name>"
description = "generate the schema for a single object type. If omitted, schemas for all objects are generated."
[[options]]
flags = "-i, --inline"
description = "print the schema to stdout instead of writing schema files."
[[options]]
flags = "-p, --pretty"
description = "prettify (indent) the JSON output before printing or writing."
[[options]]
flags = "-h, --help"
description = "print help for this command."
[[arguments]]
arg = "[path/to/archival-site]"
description = "optionally specify a path to an archival site. By default will run in the current working directory. "
