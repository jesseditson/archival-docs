order = 0
command = "archival build"
description = "Build your archival site into static files, ready to deploy to any host."
content = """
Build an archival site - this will generate a static site inside a directory (dist unless you have overridden it in manifest.toml).
"""

[[options]]
flags = "-b, --build-dir <path>"
description = "override the directory to build to. Defaults to the manifest's build_dir (dist)."
[[options]]
flags = "-s, --skip-failures"
description = "if a page fails to build, continue building the other pages and skip the failing one, rather than erroring early. Useful in CI when you'd rather ship a partial build than nothing."
[[options]]
flags = "-u, --upload-prefix <prefix>"
description = "override the upload prefix. If no manifest.toml is present, this is required."
[[options]]
flags = "-h, --help"
description = "print help for this command."
[[arguments]]
arg = "[path/to/archival-site]"
description = "optionally specify a path to an archival site. By default will run in the current working directory. "
