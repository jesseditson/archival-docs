order = -1
title = "Archival | Product"
description = "See the Archival editor. Describe a site and it's built, edit content not code, and publish to a domain you own. A guided tour of the product."

[[sections]]
key = "prompt"
title = "Describe what you want: Get real websites."
content = """
Start with a description, then attach any photos, video, or audio you already have. Archival generates several complete, real websites to choose from. Later, you can keep changing your site the same way: just describe what you'd like in plain language.
"""

[[sections]]
key = "editor"
title = "A powerful, dynamic editor for your website."
content = """
This is the Archival editor. Your live website on one side, a simple editing panel on the other. Everything you need to run your site lives here: content, media, settings, history, and publishing. Make quick changes to content, layout, and styling without touching any code.
"""

[[sections]]
key = "settings"
title = "Your site, your settings"
content = """
Point a domain you already own at your site, or buy a new one right here. Archival handles the DNS. See your plan, your connected repository, and a full history of every deploy in one place. It's your site, on your address.
"""

[[sections]]
key = "media"
title = "Media that just works"
content = """
Drag in a photo and you're done. Archival converts phone formats like HEIC automatically, uploads to a fast global network, and never stores the same file twice. No resizing, no exporting, no fuss.
"""

[[sections]]
key = "history"
title = "Every change, tracked forever"
content = """
Archival remembers every change you've ever made. Browse your full history, see exactly what changed and when, and roll back anything instantly, from a single edit to a whole day's work. Your site can never be lost.
"""

[[sections]]
key = "cta"
title = "Build yours right now"
content = """
Describe what type of site you'd like to create and we'll make you a few websites to choose from.
"""
