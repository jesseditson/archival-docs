guide_title = "Building an Archival site with Claude"
guide_intro = """
You're setting up a website with **Archival** — a content-first static site generator. This is the canonical, condensed reference; follow it exactly. The full documentation lives at https://archival.dev/docs/llms.txt if you need more depth.

Archival's whole philosophy is **separation of content from presentation**: structured content lives in TOML, and presentation lives in Liquid templates. Your job is to set up that structure cleanly, then build a beautiful visual layer on top of it.
"""

[[guide]]
title = "The one rule: content never lives in markup"
content = """
{% raw %}
This is the most important rule in Archival, and the easiest to get wrong:

**Never hardcode words, copy, images, links, or data directly into your Liquid markup.** Every piece of editable content belongs in a structured object (a TOML file), and templates pull it in with Liquid.

Don't do this:

```html
<h1>Welcome to Anna's Bakery</h1>
<p>We bake fresh sourdough every morning.</p>
```

Do this instead — define the content as an object…

```toml
# objects/home.toml
title = "Welcome to Anna's Bakery"
tagline = "We bake fresh sourdough every morning."
```

…and reference it from the template:

```html
<h1>{{ home.title }}</h1>
<p>{{ home.tagline }}</p>
```

Why this matters: the site owner (who may not be a developer) edits content in one place, the content stays consistent everywhere it's used, and the same data can be rendered as a web page, an RSS feed, a JSON API, or an llms.txt. If you find yourself typing real sentences into a `.liquid` file, stop and move them into an object.
{% endraw %}
"""

[[guide]]
title = "Project structure"
content = """
A minimal Archival project looks like this:

```
manifest.toml          # site-wide config (version, build commands, site_url)
objects.toml           # the schema: which object types exist and their fields
objects/               # the content: one TOML file per object
  home.toml
  post/
    my-first-post.toml
pages/                 # Liquid page + partial templates -> built to dist/
  index.liquid
  _nav.liquid          # partials are prefixed with _
layout/                # wrapping layouts (e.g. theme.liquid)
  theme.liquid
public/                # static assets copied verbatim into the build
style/                 # css (optional; wire up via your build)
dist/                  # build output (generated; never edit by hand)
```

Build the site with `archival build`, or run a live-reloading dev server with `archival run` (defaults to http://localhost:1024).
"""

[[guide]]
title = "manifest.toml"
content = """
`manifest.toml` holds global configuration. Sensible defaults mean it's optional, but you'll usually want at least:

```toml
archival_version = "0.12.0"   # minimum compatible archival version
site_url = "https://your-site.dev"
prebuild = ["npm ci", "npm run build"]   # commands run before `archival build`
```

Other optional overrides: `object_definition_file` (default `objects.toml`), `pages_dir` (default `pages`), `objects_dir` (default `objects`), `layout_dir` (default `layout`), `build_dir` (default `dist`).
"""

[[guide]]
title = "objects.toml — define your schema"
content = """
`objects.toml` declares every object **type** and its fields. Each field maps a name to a type.

```toml
[home]                 # a singleton: exactly one objects/home.toml
title = "string"
tagline = "string"
hero = "image"

[post]                 # a collection: many objects/post/*.toml
title = "string"
date = "date"
content = "markdown"
template = "post"      # render one page per post using pages/post.liquid
```

**Field types:** `string`, `number`, `boolean`, `date`, `markdown`, and the file types `image`, `video`, `audio`, `upload`.

**Singletons vs collections:** if a type has a single instance (like `home`), create `objects/home.toml`. If there can be many (like `post`), create files under `objects/post/`.

**Child fields** let an object contain repeating sub-records. Define them with a nested table:

```toml
[home]
title = "string"
[home.section]         # each home object can have many [[section]] entries
heading = "string"
body = "markdown"
```

**Reserved keys** (don't use as field names): `template`, `order`, `objects`, `object_name`, `page`, `page_name`.

**`template`** is special: setting `template = "post"` makes Archival render one HTML page per object using `pages/post.liquid`, output to `dist/post/<name>.html`.
"""

[[guide]]
title = "Object files — the actual content"
content = """
Objects are TOML files whose values fill in the schema. A singleton lives at `objects/home.toml`; collection items live at `objects/post/<name>.toml`.

```toml
# objects/post/hello-world.toml
title = "Hello, World"
date = "2026-01-15"
order = 20260115
content = \"\"\"
## Markdown works here
This body is parsed as Markdown.
\"\"\"
```

Notes:
- Omitted fields fall back to sensible defaults, so you don't have to set everything.
- The special **`order`** integer field controls sort order when you iterate a type in templates.
- File fields (`image`, `video`, etc.) are sub-tables; Archival populates `sha`/`url` when assets are uploaded:

```toml
[hero]
filename = "storefront.jpg"
mime = "image/jpeg"
display_type = "image"
```
"""

[[guide]]
title = "Pages, layouts & partials"
content = """
{% raw %}
Pages are `.liquid` files in `pages/`. `pages/index.liquid` builds to `dist/index.html`.

**Layouts** wrap a page. Define `layout/theme.liquid` with a `{{ page_content }}` slot, then invoke it from a page with the `layout` tag, passing any variables you like:

```html
{% layout 'theme' title: home.title %}
<h1>{{ home.title }}</h1>
```

```html
<!-- layout/theme.liquid -->
<!doctype html>
<html>
  <head><title>{{ title }}</title></head>
  <body>{{ page_content }}</body>
</html>
```

**Partials** are reusable snippets prefixed with `_`. `pages/_card.liquid` is included with `{% include 'card' %}`, and you can pass variables:

```html
{% include 'card' title: post.title, body: post.content %}
```

**Singletons are global:** an object like `home` is available in any template simply as `home.title`. Collections are available as `objects.post` to iterate:

```html
{% assign posts = objects.post | sort: "order" %}
{% for post in posts %}
  <a href="/post/{{ post.path }}.html">{{ post.title }}</a>
{% endfor %}
```
{% endraw %}
"""

[[guide]]
title = "Per-object templates & non-HTML files"
content = """
{% raw %}
**One page per object:** when a type sets `template = "post"`, create `pages/post.liquid`. Archival renders it once per object in `objects/post/`, writing `dist/post/<name>.html`. Inside that template the current object is available by its type name:

```html
{% layout 'theme' title: post.title %}
<article>
  <h1>{{ post.title }}</h1>
  <time>{{ post.date | date: "%B %-d, %Y" }}</time>
  {{ post.content }}
</article>
```

**Non-HTML output:** put the target extension before `.liquid`. `pages/feed.rss.liquid` builds to `dist/feed.rss`; `pages/posts.json.liquid` builds to `dist/posts.json`. Liquid works in any file type — that's how you generate RSS feeds, JSON APIs, and the llms.txt below.
{% endraw %}
"""

[[guide]]
title = "Pattern: prefer many objects over long lists"
content = """
{% raw %}
Favor lots of small objects over giant child-field lists — they're far easier to edit. To build sections or categories, use a `string` field as an enum and group in the template with `where`:

```toml
# objects.toml
[link]
group = "string"
title = "string"
url = "string"
```

```html
{% assign favorites = objects.link | where: "group", "favorites" %}
<ul>
  {% for link in favorites %}
    <li><a href="{{ link.url }}">{{ link.title }}</a></li>
  {% endfor %}
</ul>
```

Use **child fields** for tightly-bound repeating data (e.g. the sections of one page); use **separate objects + grouping** for anything list-like that grows over time.
{% endraw %}
"""

[[guide]]
title = "Always ship an llms.txt"
content = """
{% raw %}
**Every Archival site you build must generate an `llms.txt`.** It's a plain-text, LLM-friendly summary of the site, generated from the same objects that power the pages — so it never goes stale. Create `pages/llms.txt.liquid`:

```liquid
# {{ home.title }}

{{ home.tagline }}

## Posts
{% assign posts = objects.post | sort: "order" %}
{% for post in posts %}
### {{ post.title }}
{{ post.content | strip_html | strip }}

{% endfor %}
```

Pull from the structured objects, strip HTML out of rendered Markdown with `| strip_html | strip`, and keep it to clean headings and prose. This builds to `dist/llms.txt`. If the site has distinct content areas, give each its own section.
{% endraw %}
"""

