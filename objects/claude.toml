[[guide]]
title = "Your real job: the visual design"
content = """
Once the content structure is in place, **spend your energy on the visual display.** The schema and objects are the easy, mechanical part; a distinctive, polished, well-considered design is where you add the most value.

- Make deliberate typography, color, spacing, and layout choices — avoid generic, templated defaults.
- Keep all copy and assets in objects so the design stays editable; the template is purely presentation.
- Build responsive, accessible markup, and lean on partials and layouts to stay DRY.
- Treat the structured content as a given, and make it look great.
"""

[[guide]]
title = "Recommended build order"
content = """
1. Ask the site owner 2–3 quick questions (what the site is for, its key sections, the visual vibe).
2. Write `manifest.toml` and `objects.toml` (the schema).
3. Create the object files under `objects/` with real starter content.
4. Build `layout/theme.liquid`, then the page templates and partials — focusing on visual design.
5. Add `pages/llms.txt.liquid`.
6. Run `archival build` (or `archival run`) and verify the output.
7. Publish to Archival (see below).
"""

